name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check src/ tests/ experiments/ tla/python/
      - run: mypy src/ --ignore-missing-imports

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: PYTHONPATH=src:tla/python pytest tests/ -v -m "not cross_language and not slow"

  rust-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cd rust && cargo test --release

  cross-language:
    runs-on: ubuntu-latest
    needs: [python-test, rust-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - run: pip install -e ".[dev]" maturin
      - run: cd rust && maturin build --release && pip install target/wheels/*.whl
      - run: PYTHONPATH=src:tla/python pytest tests/ -v -m cross_language
