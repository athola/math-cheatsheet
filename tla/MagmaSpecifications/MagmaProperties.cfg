\* TLA+ model checker configuration
\* SPECIFICATION MagmaSpec

\* Check if magma is associative
PROPERTY Associative

\* Check if magma is commutative
PROPERTY Commutative

\* Type invariant
INVARIANT TypeOK

\* Constants for specific magma models
CONSTANTS
    S = {0, 1}
    op =
        (*
         * Operation table (addition mod 2):
         *   0 1
         * 0 0 1
         * 1 1 0
         *)
        <<<<
            0, 1,
            1, 0
        >>>>

\* Model checking scope
SCOPE
    (* Check up to magma size 4 *)
    MagmaSize <= 4
