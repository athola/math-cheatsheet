\* TLA+ Model Configuration for EquationChecking module
\* This configures the TLC model checker for equation verification

\* Specify the module to check
MODULE EquationChecking

\* Specification (init and next state relation)
SPECIFICATION
    Init /\ [][Next]_<<state, found_counterexample>>

\* Properties to check (invariants)
INVARIANTS
    TypeOK

\* Constants (instantiation)
CONSTANTS
    S = {0, 1}
    op = [x \in {0, 1}, y \in {0, 1} |-> (x + y) % 2]

\* View for state visualization
VIEW
    [state |->
        CASE state = "searching" THEN "Searching..."
        [] state = "found" THEN "Counterexample found!"
        [] state = "exhausted" THEN "No counterexample exists"
